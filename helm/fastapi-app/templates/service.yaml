apiVersion: v1 
kind: Service 
metadata:
  name: {{ .Release.Name }}-fastapi-svc
  labels:
    app: {{ .Release.Name }}-fastapi
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ .Release.Name }}-fastapi
  ports:
    - protocol: TCP 
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}