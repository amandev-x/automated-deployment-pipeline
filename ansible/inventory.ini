[jenkins]
<jenkins-server-ip> ansible_user=ubuntu ansible_ssh_private_key_file=<private-key-file> ansible_python_interpreter=/usr/bin/python3 ansible_ssh_common_args='-o StrictHostKeyChecking=no'

[k3s]
<k3s-server-ip> ansible_user=ubuntu ansible_ssh_private_key_file=<private-key-file> ansible_python_interpreter=/usr/bin/python3 ansible_ssh_common_args='-o StrictHostKeyChecking=no'

